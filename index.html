<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chetrend - Café IRC social</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar" role="banner">
        <div class="topbar__group topbar__group--left">
          <button class="icon-button" id="profileButton" type="button" aria-label="Perfil">
              <span class="icon-button__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10.7 3.4h2.6l.5 2.3a7.7 7.7 0 0 1 1.3.5l2-1.2 1.8 1.8-1.2 2a7.7 7.7 0 0 1 .5 1.3l2.3.5v2.6l-2.3.5a7.7 7.7 0 0 1-.5 1.3l1.2 2-1.8 1.8-2-1.2a7.7 7.7 0 0 1-1.3.5l-.5 2.3h-2.6l-.5-2.3a7.7 7.7 0 0 1-1.3-.5l-2 1.2-1.8-1.8 1.2-2a7.7 7.7 0 0 1-.5-1.3l-2.3-.5v-2.6l2.3-.5a7.7 7.7 0 0 1 .5-1.3l-1.2-2 1.8-1.8 2 1.2a7.7 7.7 0 0 1 1.3-.5l.5-2.3Z"></path>
                  <circle cx="12" cy="12" r="3.2"></circle>
                </svg>
              </span>
              <span class="button-label">Perfil</span>
            </button>
          <button class="icon-button icon-button--ghost" id="themeToggle" type="button" aria-label="Cambiar tema">
            <span class="icon-button__icon" aria-hidden="true">
              <svg class="theme-icon theme-icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2.5M12 19.5V22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M2 12h2.5M19.5 12H22M4.9 19.1l1.8-1.8M17.3 6.7l1.8-1.8"></path>
              </svg>
              <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 14.2A8.5 8.5 0 1 1 9.8 4a7 7 0 0 0 10.2 10.2Z"></path>
              </svg>
            </span>
            <span class="theme-toggle__label">Tema</span>
          </button>
        </div>

        <div class="topbar__title">
          <span class="topbar__eyebrow">Sala social</span>
          <h1 id="currentTopicTitle">Sala general</h1>
        </div>

        <div class="topbar__group topbar__group--right">
          <button class="text-button" id="contactAdminButton" type="button" aria-label="Contacto admin">
            <span class="icon-button__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h16v12H4z"></path>
                <path d="m4 7 8 6 8-6"></path>
              </svg>
            </span>
            <span class="button-label">Contacto admin</span>
          </button>
          <button class="text-button text-button--accent" id="storeButton" type="button" aria-label="Tienda">
            <span class="icon-button__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 9h14l-1 11H6L5 9Z"></path>
                <path d="M9 9V7a3 3 0 0 1 6 0v2"></path>
              </svg>
            </span>
            <span class="button-label">Tienda</span>
          </button>
          <button class="icon-button icon-button--drawer mobile-right-drawer" id="openRightDrawer" type="button" aria-label="Abrir usuarios y rankings">
            <span class="icon-button__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h16M4 12h16M4 18h16"></path>
              </svg>
            </span>
          </button>
        </div>
      </header>

      <main class="workspace" aria-label="Chat social">
        <section class="panel panel--topics" aria-label="Temas">
          <div class="panel__header panel__header--topics">
            <button class="text-button text-button--accent mobile-create-toggle" id="openMobileCreate" type="button">Crear nuevo tema</button>
            <button class="text-button text-button--accent mobile-create-close mobile-create-close--header" id="closeMobileCreateMobile" type="button">Volver atrás</button>
          </div>
          <div class="mobile-topic-stage">
            <div class="mobile-topic-stage__view mobile-topic-stage__view--list">
              <div class="scroll-list" id="topicList"></div>
            </div>
            <div class="mobile-topic-stage__view mobile-topic-stage__view--create" aria-hidden="true">
              <div class="mobile-create-card">
                <form class="create-form create-form--mobile" id="mobileCreateTopicForm">
                  <label class="field">
                    <input id="mobileTopicTitleInput" type="text" maxlength="48" placeholder="Título" required />
                  </label>
                  <label class="field">
                    <textarea id="mobileTopicDescriptionInput" rows="4" maxlength="220" placeholder="Descripción"></textarea>
                  </label>
                  <button class="primary-button" type="submit">Crear nuevo tema</button>
                </form>
              </div>
            </div>
          </div>
        </section>

        <section class="panel panel--create" aria-labelledby="createTitle">
          <div class="panel__header">
            <div>
              <h2 id="createTitle">Nuevo tema</h2>
            </div>
            <button class="icon-button icon-button--compact mobile-create-close" id="closeMobileCreate" type="button" aria-label="Cerrar creación">
              <span aria-hidden="true">×</span>
            </button>
          </div>
          <form class="create-form" id="createTopicForm">
            <label class="field">
              <span>Título</span>
              <input id="topicTitleInput" type="text" maxlength="48" placeholder="Título" required />
            </label>
            <label class="field">
              <span>Descripción</span>
              <textarea id="topicDescriptionInput" rows="4" maxlength="220" placeholder="Abro este hilo para..."></textarea>
            </label>
            <button class="primary-button" type="submit">Crear nuevo tema</button>
          </form>
        </section>

        <section class="panel panel--chat" aria-labelledby="chatTitle">
          <div class="panel__header panel__header--chat">
            <div>
              <h2 id="chatTitle">Chat principal</h2>
            </div>
            <div class="chat-actions">
              <button class="icon-button icon-button--compact" id="refreshButton" type="button" aria-label="Actualizar contenido manualmente">
                <span aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4v6h6"></path>
                    <path d="M20 20v-6h-6"></path>
                    <path d="M20 10a8 8 0 0 0-14.5-4.5M4 14a8 8 0 0 0 14.5 4.5"></path>
                  </svg>
                </span>
                <span>Actualizar</span>
              </button>
              <div class="refresh-state" id="refreshState">Sin actualizar</div>
            </div>
          </div>

          <div class="chat-hero">
            <div>
              <p class="chat-hero__label">Tema abierto</p>
              <h3 id="chatTopicName">Sala general</h3>
            </div>
            <div class="chat-hero__actions">
              <button class="text-button chat-hero__back" id="backToTopics" type="button">Volver a temas</button>
              <p class="chat-hero__description" id="chatTopicDescription">Selecciona un tema para leer y escribir dentro de la sala.</p>
            </div>
          </div>

          <div class="message-stream" id="messageStream" aria-live="polite"></div>

          <form class="composer" id="messageForm">
            <label class="composer__field">
              <span class="sr-only">Escribe tu mensaje</span>
              <textarea id="messageInput" rows="2" maxlength="240" placeholder="Escribe aquí..." required></textarea>
            </label>
            <button class="primary-button" type="submit">Enviar</button>
          </form>
        </section>

        <section class="panel panel--users" aria-labelledby="usersTitle">
          <div class="panel__header">
            <div>
              <h2 id="usersTitle">Usuarios conectados</h2>
            </div>
            <span class="panel__meta">Ordenados por presencia</span>
          </div>
          <div class="scroll-list" id="userList"></div>
        </section>

        <section class="panel panel--rankings" aria-labelledby="rankingsTitle">
          <div class="panel__header">
            <div>
              <h2 id="rankingsTitle">Rankings</h2>
            </div>
            <div class="ranking-switch">
              <button class="icon-button icon-button--compact" id="rankingPrev" type="button" aria-label="Ver ranking global">
                <span aria-hidden="true">↑</span>
              </button>
              <button class="icon-button icon-button--compact" id="rankingNext" type="button" aria-label="Ver ranking del tema">
                <span aria-hidden="true">↓</span>
              </button>
            </div>
          </div>
          <div class="ranking-mode" id="rankingMode">Global</div>
          <div class="scroll-list" id="rankingList"></div>
        </section>
      </main>
    </div>

    <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>

    <aside class="drawer drawer--left" id="leftDrawer" aria-label="Temas" aria-hidden="true">
      <div class="drawer__header">
        <div>
          <p class="panel__kicker">Menú</p>
          <h2>Temas</h2>
        </div>
        <button class="icon-button icon-button--compact" data-close-drawer="left" type="button" aria-label="Cerrar temas">
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <div class="scroll-list" id="leftDrawerTopics"></div>
      </aside>

    <aside class="drawer drawer--right" id="rightDrawer" aria-label="Usuarios y rankings" aria-hidden="true">
        <div class="drawer__header">
          <button class="icon-button icon-button--compact" data-close-drawer="right" type="button" aria-label="Cerrar usuarios y rankings">
            <span aria-hidden="true">×</span>
          </button>
        </div>
      <section class="drawer__section drawer__section--half">
        <h3>Ultimos usuarios activos</h3>
        <div class="scroll-list" id="drawerUserList"></div>
      </section>
      <section class="drawer__section drawer__section--half">
        <div class="drawer-ranking__header">
          <h3>Ranking</h3>
          <div class="drawer-ranking__switch" aria-label="Cambiar modo de ranking">
            <button class="icon-button icon-button--compact" id="drawerRankingPrev" type="button" aria-label="Ver ranking global">
              <span aria-hidden="true">↑</span>
            </button>
            <button class="icon-button icon-button--compact" id="drawerRankingNext" type="button" aria-label="Ver ranking del tema">
              <span aria-hidden="true">↓</span>
            </button>
          </div>
        </div>
        <div class="ranking-mode" id="drawerRankingMode">Global</div>
        <div class="scroll-list" id="drawerRankingList"></div>
      </section>
    </aside>

    <script src="./app.js"></script>
  </body>
</html>
